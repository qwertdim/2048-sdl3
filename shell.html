<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Game 2048</title>
    <link rel="icon" type="image/x-icon" href="Favicon.png">
    <style>
        body { margin: 0; background-color: black; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 0 none; background-color: #000; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <!-- Основной холст для вывода графики -->
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <script type='text/javascript'>
      var Module = {
        canvas: (function() {
          var canvas = document.getElementById('canvas');
          return canvas;
        })()
      };

      function resumeAudioContext() {
        try {
          var ctx = (Module && Module.audioContext) || new (window.AudioContext || window.webkitAudioContext)();
          if (ctx.state === 'suspended') {
            ctx.resume().catch(function(e) {
              console.log('AudioContext resume failed:', e);
            });
          }
          Module = Module || {};
          Module.audioContext = ctx;
        } catch (e) {
          console.log('AudioContext create/resume failed:', e);
        }
      }

      document.addEventListener('pointerdown', resumeAudioContext, { once: true });
      document.addEventListener('keydown', resumeAudioContext, { once: true });
    </script>
    
    <!-- Сюда Emscripten подставит основной JS-код -->
    {{{ SCRIPT }}}
</body>
</html>
